<!DOCTYPE html>
<html lang="zh-CN">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园拼拼乐</title>
    <style>
         nav {
            background-color: #2c3e50; /* 深蓝色背景 */
            width: 100%; /* 占满整个宽度 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* 增加阴影提升层次感 */
        }

        /* 导航链接容器，用于居中导航项 */
        .nav-container {
            max-width: 1200px;
            margin: 0 auto; /* 水平居中 */
            display: flex; /* 横向排列链接 */
        }

        /* 导航链接样式 */
        nav a {
            color: white; /* 文字白色 */
            text-decoration: none; /* 去掉下划线 */
            padding: 15px 20px; /* 内边距，增加点击区域 */
            display: inline-block; /* 让 padding 生效 */
            transition: background-color 0.3s ease; /* 过渡效果，更丝滑 */
        }

        /* 鼠标悬停效果 */
        nav a:hover {
            background-color: #34495e; /* 悬停时加深背景色 */
            color: #f1c40f; /* 文字变成浅黄色 */
        }

        /* 可选：当前页面链接的样式（比如首页） */
        nav a.active {
            background-color: #1abc9c;
            color: white;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #e6f7ff;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        /* 新增logo+标题区域样式 */
        .header-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .logo {
            width: 80px; /* 调整logo大小 */
            height: auto;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .main-img {
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .desc {
            color: #333;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ffd166;
            color: #333;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #ffc43d;
        }
        /* 适配手机端的布局 */
        @media (max-width: 500px) {
            .header-area {
                flex-direction: column;
                gap: 10px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="登录.html" class="active">首页</a>
            <a href="封面.html">封面</a>
            <a href="关于我们.html">关于我们</a>
             <a href="拼拼乐.html">拼拼乐</a>
        </div>
    </nav>
    <div class="container">
        <!-- 新增logo+标题区域 -->
        <div class="header-area">
            <img class="logo" src="logo.jpg" alt="校园拼拼乐logo">
            <h1>校园拼拼乐，生活更欢乐！</h1>
        </div>
        
        <img class="main-img" src="1.jpg" alt="校园拼拼乐插画">
        <p class="desc">
            把校园里的快乐都“拼”在一起~
            一起开启有趣的校园旅程吧！
        </p>
        <a href="#" class="btn">加入拼拼乐</a>
    </div>
</body>
</html>
